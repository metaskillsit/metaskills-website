name: Deploy to A2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Deploy to A2
        env:
          A2_HOST: ${{ secrets.A2_HOST }}
          A2_USER: ${{ secrets.A2_USER }}
          A2_PASSWORD: ${{ secrets.A2_PASSWORD }}
        run: |
          sshpass -p "$A2_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            dist/ "${A2_USER}@${A2_HOST}:/home/metaski1/public_html/"
