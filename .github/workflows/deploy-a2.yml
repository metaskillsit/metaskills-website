name: Deploy to A2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-metaskills
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Build project
      - name: Build project
        run: npm run build

      # 5. Deploy to A2 via FTP (FULL RESET DEPLOY)
      - name: Deploy to A2 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21

          # Upload ONLY built files
          local-dir: dist/

          # 🔥 CRITICAL: MUST BE public_html
          server-dir: public_html/

          # 🔥 FORCE CLEAN (removes old images, old build, EVERYTHING)
          dangerous-clean-slate: true

          # Ignore unnecessary files
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
