name: Deploy to A2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-metaskills
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to A2 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21

          local-dir: dist/
          server-dir: public_html/

          # ✅ Incremental deploy
          dangerous-clean-slate: false

          log-level: verbose

          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
