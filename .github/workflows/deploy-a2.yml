name: Deploy to A2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-metaskills
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Nod
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Deploy dist via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: dist/
          server-dir: metaskills.sg/
          exclude: |
            **/wp-content/**
            **/wp-includes/**
            **/wp-admin/**
            **/wp-*.php
            **/.ftp-deploy-sync-state.json
